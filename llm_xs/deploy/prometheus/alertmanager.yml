global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default
    # 灰度默认仅 Web UI；生产请改为 webhook / email / 钉钉等
    # webhook_configs:
    #   - url: http://your-oncall-webhook

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [alertname, service]
