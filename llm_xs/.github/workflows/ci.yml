name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.docker.txt

      - name: Install backend dependencies
        run: pip install -r requirements.docker.txt

      - name: Run production API tests
        env:
          KIDS_API_KEYS: ""
          KIDS_JWT_SECRET: ""
          KIDS_API_RATE_LIMIT_PER_MIN: "1000"
          KIDS_VECTOR_BACKEND: keyword
        run: pytest tests/ -v --tb=short -m "not integration"

      - name: Dependency security audit
        run: pip install pip-audit && pip-audit -r requirements.docker.txt

      - name: Static security scan (bandit)
        run: pip install bandit && bandit -r app/ -c bandit.yaml -ll -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - run: npm ci
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t kid-assistant-backend:test .
