# TLS 灰度/生产 overlay（需先准备证书到 deploy/certs/）
#   ./scripts/tls/generate-self-signed.sh your-domain.example.com   # 开发/内网
#   或 certbot 挂载到 deploy/certs/live/<domain>/
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     -f docker-compose.tls.yml --profile full --profile frontend up -d

services:
  nginx:
    ports:
      - "443:443"
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT_DIR:-./deploy/certs}:/etc/letsencrypt:ro

  backend:
    environment:
      KIDS_HSTS_MAX_AGE: "31536000"
      KIDS_TRUSTED_PROXY_HOPS: "1"

  grafana:
    environment:
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://localhost/grafana}
